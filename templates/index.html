<!DOCTYPE html>
<html>
<head>
    <title>Support Ticket System</title>
</head>
<body>
    <h1>Support Ticket System</h1>

    <h2>Create Ticket</h2>
    <input id="title" placeholder="Title"><br><br>
    <input id="description" placeholder="Description"><br><br>
    <button onclick="createTicket()">Create</button>

    <h2>Tickets</h2>
    <ul id="tickets"></ul>

    <script>
        async function loadTickets() {
            let res = await fetch('/tickets');
            let data = await res.json();

            let list = document.getElementById('tickets');
            list.innerHTML = '';

            data.forEach(t => {
                let li = document.createElement('li');
                li.innerText = t.title + " (" + t.status + ")";
                list.appendChild(li);
            });
        }

        async function createTicket() {
            let title = document.getElementById('title').value;
            let description = document.getElementById('description').value;

            await fetch('/tickets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, description})
            });

            loadTickets();
        }

        loadTickets();
    </script>
</body>
</html>
