<script>
let allTickets = [];

async function loadTickets() {
    try {
        let res = await fetch('/tickets');
        let data = await res.json();

        allTickets = data;

        // Update stats
        document.getElementById('total').innerText = data.length;
        document.getElementById('open').innerText = data.filter(t => t.status === "Open").length;
        document.getElementById('closed').innerText = data.filter(t => t.status === "Closed").length;

        displayTickets(data);
    } catch (error) {
        console.error("Error loading tickets:", error);
    }
}

function displayTickets(data) {
    let container = document.getElementById('tickets');
    container.innerHTML = '';

    data.forEach(t => {
        let div = document.createElement('div');

        div.innerHTML =
            "<b>" + (t.title || "No Title") + "</b> (" + (t.status || "Open") + ")<br>" +
            (t.description || "") + "<br>" +
            "<button onclick='closeTicket(" + t.id + ")'>Close</button>";

        container.appendChild(div);
    });
}

function filterTickets(status) {
    if (!status) {
        displayTickets(allTickets);
        return;
    }

    let filtered = allTickets.filter(t => t.status === status);
    displayTickets(filtered);
}

async function createTicket() {
    let title = document.getElementById('title').value;
    let description = document.getElementById('description').value;

    if (!title || !description) {
        alert("Please fill in all fields");
        return;
    }

    try {
        await fetch('/tickets', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title: title, description: description })
        });

        // Clear inputs
        document.getElementById('title').value = '';
        document.getElementById('description').value = '';

        loadTickets();
    } catch (error) {
        console.error("Error creating ticket:", error);
    }
}

async function closeTicket(id) {
    try {
        await fetch('/tickets/' + id + '/close', {
            method: 'POST'
        });

        loadTickets();
    } catch (error) {
        console.error("Error closing ticket:", error);
    }
}

// Initial load
loadTickets();
</script>
